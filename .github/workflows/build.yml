name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool \
            pkg-config cmake libffi-dev libssl-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev libltdl-dev \
            build-essential ccache libjpeg-dev libpng-dev

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK
        run: |
          echo "===== START BUILD ====="
          set -o pipefail

          buildozer android clean

          buildozer -v android debug > build.log 2>&1 || (
            echo "===== BUILD FAILED — SHOW LAST LOG ====="
            tail -n 400 build.log
            exit 1
          )

          echo "===== BUILD FINISHED ====="

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Fail if build failed
        run: |
          ls -la bin || true
          test -f bin/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
